name: Build Extension

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Zip extension
        run: zip -r whatsapp-crm-extension.zip .output/chrome-mv3

      - uses: actions/upload-artifact@v4
        with:
          name: whatsapp-crm-extension
          path: whatsapp-crm-extension.zip
          retention-days: 90
